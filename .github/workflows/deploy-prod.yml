name: Deploy — Production

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  # ──────────────────────────────────────────────────────────────
  # Build multi-arch image and push to GHCR with :main + :latest tags
  # ──────────────────────────────────────────────────────────────
  build:
    name: Build & Push Production Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image name (lowercase)
        id: prep
        run: echo "repo_lc=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build & Push Middleware (:main + :latest tags)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./middleware/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.prep.outputs.repo_lc }}/middleware:main
            ghcr.io/${{ steps.prep.outputs.repo_lc }}/middleware:latest

  # ──────────────────────────────────────────────────────────────
  # Deploy to production — requires manual approval via GitHub
  # Environment protection rules (Settings → Environments → production)
  # ──────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: SSH Deploy to Production Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/tokkatot

            git fetch origin main
            # Production deploy must be reproducible; discard any server-side edits.
            git checkout -f main
            git reset --hard origin/main

            # Ensure the shared proxy network exists (idempotent)
            docker network create tokkatot-proxy-net 2>/dev/null || true

            # Authenticate to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest image and restart the production stack
            IMAGE_TAG=main docker compose up -d --pull always

            # Show status
            echo "=== Production Stack Status ==="
            docker compose ps
