<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>AI Disease Detection - Tokkatot</title>
    
    <link rel="stylesheet" href="/css/theme.css?v=1.5" />
    <link rel="stylesheet" href="/css/components.css?v=1.5" />
    <link rel="stylesheet" href="/css/layout.css?v=1.5" />
    <link rel="stylesheet" href="/css/disease.css?v=1.5" />
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <style>
        /* This container ensures the page fills the gap between fixed header and footer */
        .viewport-wrapper {
            display: flex;
            flex-direction: column;
            min-height: 100vh; /* Full screen height */
            max-width: 480px;
            margin: 0 auto;
            box-sizing: border-box;
            /* Adjust padding based on your header/footer heights */
            padding-top: 64px; 
            padding-bottom: 76px;
        }

        /* This is what creates the "Equal Space" centering */
        .coming-soon-centering-box {
            flex: 1; /* Takes all available middle space */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* Centers items vertically */
            padding: 20px;
            text-align: center;
            animation: fadeIn 0.6s ease-out;
        }

        .icon-bg {
            width: 110px;
            height: 110px;
            background: rgba(0, 137, 123, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
        }

        .coming-soon-badge {
            background: #E0F2F1;
            color: var(--tok-teal);
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }

        .btn-full-width {
            width: 100%;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 12px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="monitoring-page">

<div id="header-placeholder"></div>

<div class="viewport-wrapper">
    <div class="coming-soon-centering-box">
        <div class="icon-bg">
            <span class="material-symbols-outlined" style="font-size: 52px; color: var(--tok-teal);">biotech</span>
        </div>
        
        <h2 style="font-weight: 800; font-size: 28px; margin: 0 0 8px 0; color: var(--tok-text-primary);" data-i18n="ai_disease_title">
            AI Disease Detection
        </h2>
        
        <div class="coming-soon-badge">Coming Soon</div>
        
        <p style="color: var(--tok-text-secondary); line-height: 1.6; max-width: 320px; margin-bottom: 40px;" data-i18n="ai_training_msg">
            We are training our AI to detect poultry diseases from photos. This feature will be available in the next version.
        </p>
        
        <a href="/" class="tok-btn tok-btn-primary btn-full-width" data-i18n="back_to_home">
            Back to Home
        </a>
    </div>
</div>

<div id="app" class="page-container" style="display: none;">
    <div style="font-size: 24px; font-weight: 700; color: var(--tok-text-primary); margin-bottom: 24px;" data-i18n="detect_disease">Detect Disease</div>

    <div class="section">
        <div class="upload-zone" id="uploadZone">
            <div class="upload-icon">
                <span class="material-symbols-outlined" style="font-size:56px;">photo_camera</span>
            </div>
            <p style="font-size: 18px; font-weight: 700; margin-bottom: 8px;" data-i18n="upload_or_take">
                Take Photo or Upload
            </p>
            <p style="color: var(--tok-text-secondary); font-size: 14px; margin-bottom: 24px;" data-i18n="drag_or_click">Drag and drop or click to choose</p>
            <div style="display:flex;gap: 16px; justify-content:center;">
                <button class="tok-btn tok-btn-primary" onclick="document.getElementById('cameraInput').click()">
                    <span class="material-symbols-outlined" style="margin-right: 8px;">photo_camera</span>
                    <span data-i18n="take_photo">Take Photo</span>
                </button>
                <button class="tok-btn tok-btn-secondary" onclick="document.getElementById('fileInput').click()">
                    <span class="material-symbols-outlined" style="margin-right: 8px;">upload</span>
                    <span data-i18n="select_file">Select File</span>
                </button>
            </div>
            <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;">
            <input type="file" id="fileInput" accept="image/*" style="display:none;">
        </div>

        <img id="previewImg" class="preview-img" alt="Preview" />

        <div id="loadingState" style="display:none; text-align:center; padding: 40px 0;">
            <div class="spinner"></div>
            <p data-i18n="analyzing_msg">AI is analyzing the image...</p>
        </div>

        <div id="resultCard" class="tok-card" style="display: none; margin-top: 24px;">
            <div id="resultBadge" class="tok-badge"></div>
            <div id="recommendation"></div>
            <button class="tok-btn tok-btn-secondary" style="width: 100%; margin-top: 24px;" onclick="resetDetection()">
                <span class="material-symbols-outlined" style="margin-right: 8px;">refresh</span>
                <span data-i18n="retry_detection">Try Again</span>
            </button>
        </div>
    </div>
</div>

<div id="navbar-placeholder"></div>

<script src="/js/utils/i18n.js?v=1.5"></script>
<script src="/js/utils/api.js?v=1.5"></script>
<script src="/js/utils/components.js?v=1.5"></script>
<script>
    /* ALL JAVASCRIPT LOGIC PRESERVED */
    async function init() {
        if (!window.API.requireAuth()) return;
        await loadComponents();
        if (window.i18n && window.i18n.applyAll) {
            window.i18n.applyAll();
        }
    }

    document.getElementById('cameraInput').addEventListener('change', e => handleFile(e.target.files[0]));
    document.getElementById('fileInput').addEventListener('change', e => handleFile(e.target.files[0]));

    function handleFile(file) {
        if (!file || !file.type.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = e => {
            const img = document.getElementById('previewImg');
            img.src = e.target.result;
            img.style.display = 'block';
        };
        reader.readAsDataURL(file);
    }

    function resetDetection() {
        document.getElementById('previewImg').style.display = 'none';
        document.getElementById('resultCard').style.display = 'none';
    }

    init().catch(console.error);
</script>

</body>
</html>
