<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Tokkatot</title>
  <link rel="icon" href="/assets/images/tokkatot logo-02.png" type="image/x-icon" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#00897B" />
  
  <!-- Tokkatot Design System (Modular) -->
  <link rel="stylesheet" href="/css/theme.css?v=1.5" />
  <link rel="stylesheet" href="/css/components.css?v=1.5" />
  <link rel="stylesheet" href="/css/auth.css?v=1.5" />
  
  <!-- Google Material Symbols -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body class="auth-body">

<div id="app" class="auth-page" v-cloak>

  <div class="lang-row">
    <button class="lang-toggle" @click="toggleLang">
      <span class="material-symbols-outlined">language</span>
      {{ lang === 'km' ? t('lang_en') : t('lang_km') }}
    </button>
  </div>

  <div class="auth-logo">
    <img src="/assets/images/tokkatot logo-02.png" alt="Tokkatot" />
    <span class="auth-logo-name">Tokkatot</span>
  </div>

  <h1 class="auth-title" data-i18n="register">Register</h1>

  <!-- Error / success alerts -->
  <div v-if="errorMsg" class="tok-badge tok-badge-alert" style="display: flex; align-items: center; gap: 8px; padding: 12px; margin-bottom: 16px; border-radius: 8px;">
    <span class="material-symbols-outlined">error</span>
    {{ errorMsg }}
  </div>
  <div v-if="successMsg" class="tok-badge tok-badge-active" style="display: flex; align-items: center; gap: 8px; padding: 12px; margin-bottom: 16px; border-radius: 8px;">
    <span class="material-symbols-outlined">check_circle</span>
    {{ successMsg }}
  </div>

  <div class="forms-stack">
    <!-- Full name -->
    <div class="tok-input-group">
      <label class="tok-label" for="fullname">{{ t('full_name') }}</label>
      <div style="position: relative;">
        <span class="material-symbols-outlined" style="position: absolute; left: 14px; top: 12px; color: var(--tok-text-secondary);">person</span>
        <input id="fullname" class="tok-input" style="padding-left: 48px;" type="text" v-model="fullName"
          :placeholder="t('full_name')" autocomplete="name" required />
      </div>
    </div>

    <!-- Email -->
    <div class="tok-input-group">
      <label class="tok-label" for="email">{{ t('email') }}</label>
      <div style="position: relative;">
        <span class="material-symbols-outlined" style="position: absolute; left: 14px; top: 12px; color: var(--tok-text-secondary);">mail</span>
        <input id="email" class="tok-input" style="padding-left: 48px;" type="email" v-model="email"
          :placeholder="t('email')" autocomplete="email" inputmode="email" required />
      </div>
    </div>

    <!-- Phone -->
    <div class="tok-input-group">
      <label class="tok-label" for="phone">{{ t('phone') }}</label>
      <div style="position: relative;">
        <span class="material-symbols-outlined" style="position: absolute; left: 14px; top: 12px; color: var(--tok-text-secondary);">phone</span>
        <input id="phone" class="tok-input" style="padding-left: 48px;" type="tel" v-model="phone"
          :placeholder="t('phone')" inputmode="tel" autocomplete="tel" />
      </div>
    </div>

    <!-- National ID -->
    <div class="tok-input-group">
      <label class="tok-label" for="national_id">{{ t('national_id') }}</label>
      <div style="position: relative;">
        <span class="material-symbols-outlined" style="position: absolute; left: 14px; top: 12px; color: var(--tok-text-secondary);">badge</span>
        <input id="national_id" class="tok-input" style="padding-left: 48px;" type="text" v-model="nationalID"
          :placeholder="t('national_id')" autocomplete="off" />
      </div>
    </div>

    <!-- Registration type selector -->
    <div class="tok-input-group">
      <label class="tok-label">{{ t('register_as') }}</label>
      <div style="display:flex;gap:8px;">
        <button type="button" class="tok-btn" :class="mode==='farmer' ? 'tok-btn-primary' : 'tok-btn-secondary'" style="flex:1;" @click="mode='farmer'">
          <span class="material-symbols-outlined" style="font-size:18px; margin-right: 8px;">agriculture</span>
          {{ t('farmer') }}
        </button>
        <button type="button" class="tok-btn" :class="mode==='worker' ? 'tok-btn-primary' : 'tok-btn-secondary'" style="flex:1;" @click="mode='worker'">
          <span class="material-symbols-outlined" style="font-size:18px; margin-right: 8px;">person</span>
          {{ t('worker') }}
        </button>
      </div>
      <div style="font-size: 14px; color: var(--tok-text-secondary); margin-top: 8px;">
        <span v-if="mode==='farmer'" data-i18n="req_reg_key">Requires a registration key from Tokkatot</span>
        <span v-else data-i18n="use_farmer_id">Use your farm owner's ID to join their farm</span>
      </div>
    </div>

    <!-- Registration key (farmer mode) -->
    <div v-if="mode==='farmer'" class="tok-input-group">
      <label class="tok-label" for="regkey">{{ t('register_key') }}</label>
      <div style="position: relative;">
        <span class="material-symbols-outlined" style="position: absolute; left: 14px; top: 12px; color: var(--tok-text-secondary);">key</span>
        <input id="regkey" class="tok-input" style="padding-left: 48px;" type="text" v-model="regKey"
          :placeholder="t('register_key')" autocomplete="off" />
      </div>
    </div>

    <!-- Farmer ID (worker mode) -->
    <div v-else class="tok-input-group">
      <label class="tok-label" for="farmerid">{{ t('farmer_id') }}</label>
      <div style="position: relative;">
        <span class="material-symbols-outlined" style="position: absolute; left: 14px; top: 12px; color: var(--tok-text-secondary);">badge</span>
        <input id="farmerid" class="tok-input" style="padding-left: 48px;" type="text" v-model="farmerID"
          :placeholder="t('paste_farmer_id')" autocomplete="off" />
      </div>
    </div>

    <!-- Password -->
    <div class="tok-input-group">
      <label class="tok-label" for="password">{{ t('password') }}</label>
      <div style="position: relative;">
        <span class="material-symbols-outlined" style="position: absolute; left: 14px; top: 12px; color: var(--tok-text-secondary);">lock</span>
        <input id="password" class="tok-input" style="padding-left: 48px; padding-right: 48px;" :type="showPwd ? 'text' : 'password'"
          v-model="password" :placeholder="t('password')" autocomplete="new-password" required />
        <span class="material-symbols-outlined" style="position: absolute; right: 14px; top: 12px; color: var(--tok-text-secondary); cursor: pointer;" @click="showPwd = !showPwd">
          {{ showPwd ? 'visibility_off' : 'visibility' }}
        </span>
      </div>
    </div>

    <!-- Confirm password -->
    <div class="tok-input-group">
      <label class="tok-label" for="confirm">{{ t('confirm_password') }}</label>
      <div style="position: relative;">
        <span class="material-symbols-outlined" style="position: absolute; left: 14px; top: 12px; color: var(--tok-text-secondary);">lock_reset</span>
        <input id="confirm" class="tok-input" style="padding-left: 48px;" :type="showPwd ? 'text' : 'password'"
          v-model="confirmPwd" :placeholder="t('confirm_password')" autocomplete="new-password" required />
      </div>
    </div>

    <!-- Submit -->
    <button class="tok-btn tok-btn-primary" style="width: 100%; font-size: 18px;" @click="doRegister" :disabled="loading">
      <span v-if="loading" style="display: block; width: 24px; height: 24px; border: 3px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 1s linear infinite;"></span>
      <span v-else data-i18n="register">Register</span>
    </button>
  </div>

  <p class="auth-footer">
    {{ t('have_account') }}
    <a href="/login">{{ t('login') }}</a>
  </p>

</div>

<script src="/js/utils/i18n.js?v=1.5"></script>
<script src="/js/utils/api.js?v=1.5"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script>
const { createApp } = Vue;

createApp({
  data() {
    return {
      fullName:   '',
      email:      '',
      phone:      '',
      nationalID: '',
      regKey:     '',
      farmerID:   '',
      mode:       'farmer',
      password:   '',
      confirmPwd: '',
      showPwd:    false,
      loading:    false,
      errorMsg:   '',
      successMsg: '',
      lang: window.i18n ? window.i18n.getLang() : 'km'
    };
  },
  mounted() {
    if (window.API && window.API.isAuthenticated()) {
      window.location.href = '/';
    }
    this.updateTitle();
  },
  methods: {
    t(key) {
      return window.i18n ? window.i18n.t(key) : key;
    },
    toggleLang() {
      if (window.i18n) {
        window.i18n.toggleLang();
        this.lang = window.i18n.getLang();
        document.documentElement.lang = this.lang;
        this.updateTitle();
      }
    },
    updateTitle() {
      document.title = this.t('register') + ' - Tokkatot';
    },
    async doRegister() {
      this.errorMsg = '';
      this.successMsg = '';
      if (!this.fullName || !this.email || !this.password) {
        this.errorMsg = this.t('fill_all_fields');
        return;
      }
      if (this.mode === 'farmer' && !this.regKey) {
        this.errorMsg = this.t('reg_key_req');
        return;
      }
      if (this.mode === 'worker' && !this.farmerID) {
        this.errorMsg = this.t('farmer_id_req');
        return;
      }
      if (this.password !== this.confirmPwd) {
        this.errorMsg = this.t('pwd_mismatch');
        return;
      }
      if (this.password.length < 6) {
        this.errorMsg = this.t('pwd_min_len');
        return;
      }
      this.loading = true;
      try {
        const payload = {
          name:     this.fullName,
          email:    this.email,
          password: this.password,
          language: this.lang
        };
        if (this.phone) payload.phone = this.phone;
        if (this.nationalID) payload.national_id_number = this.nationalID;
        if (this.mode === 'farmer' && this.regKey)   payload.registration_key = this.regKey;
        if (this.mode === 'worker' && this.farmerID) payload.farmer_id = this.farmerID;

        const data = await window.API.post('/v1/auth/signup', payload);
        if (data && data.success) {
          try {
            const loginData = await window.API.post('/v1/auth/login', {
              email: this.email,
              password: this.password
            });
            if (loginData && loginData.success && loginData.data) {
              localStorage.setItem('access_token',  loginData.data.access_token);
              localStorage.setItem('refresh_token', loginData.data.refresh_token);
              if (loginData.data.user) {
                if (loginData.data.user.name) localStorage.setItem('user_name', loginData.data.user.name);
                if (loginData.data.user.role) localStorage.setItem('user_role', loginData.data.user.role);
                if (loginData.data.user.id)   localStorage.setItem('user_id',   loginData.data.user.id);
              }
              if (loginData.data.user && loginData.data.user.role === 'admin') {
                window.location.href = '/admin';
              } else {
                window.location.href = '/';
              }
              return;
            }
          } catch (e) { }
          this.successMsg = this.t('register_success');
          setTimeout(() => { window.location.href = '/login'; }, 1800);
        } else {
          const rawMsg = (data && data.error && data.error.message) || (data && data.message) || 'register_failed';
          this.errorMsg = this.t(rawMsg);
        }
      } catch (e) {
        this.errorMsg = this.t('register_failed');
      } finally {
        this.loading = false;
      }
    }
  }
}).mount('#app');
</script>

<style>
@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</body>
</html>
