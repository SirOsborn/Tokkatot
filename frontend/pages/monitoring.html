<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring - Tokkatot</title>
    
    <script>
        (function() {
            const token = localStorage.getItem('access_token');
            if (!token) {
                window.location.href = '/login?redirect=' + encodeURIComponent(window.location.pathname);
            }
        })();
    </script>
    
    <link rel="stylesheet" href="/css/theme.css?v=1.6">
    <link rel="stylesheet" href="/css/components.css?v=1.6">
    <link rel="stylesheet" href="/css/layout.css?v=1.6">
    <link rel="stylesheet" href="/css/monitoring.css?v=1.6">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="monitoring-page">
    <div id="header-placeholder"></div>

    <div id="app">
        <main class="page-content">
            <div class="monitoring-container">

                <!-- Single white card -->
                <div class="monitoring-main-card">

                    <!-- ── Coop Selector (custom dropdown, no native <select>) ── -->
                    <div class="coop-selector-wrap" id="coopSelectorWrap">
                        <div class="coop-selector-label" data-i18n="select_coop">Select Coop</div>
                        <button class="coop-selector-btn" id="coopSelectorBtn" type="button">
                            <span id="selectedCoopName">—</span>
                            <span class="material-symbols-outlined chevron">expand_more</span>
                        </button>
                        <div class="coop-dropdown" id="coopDropdown"></div>
                    </div>

                    <!-- ── Weather Hero ── -->
                    <div class="weather-hero">
                        <!-- Coop name label (small, uppercase) -->
                        <div class="weather-hero-top" id="coopLabel">—</div>

                        <!-- Temperature: num and °C in flex row so they stay together -->
                        <div class="weather-hero-temp">
                            <span class="temp-num" id="temperatureNum">--</span>
                            <span class="temp-unit">°C</span>
                        </div>

                        <div class="weather-hero-preview" id="hlLine">
                            <span>Highest: -- at --</span>
                            <span>•</span>
                            <span>Lowest: -- at --</span>
                        </div>
                        <div class="weather-hero-humidity" id="humidityValue">Humidity: --%</div>
                        <div class="weather-hero-state" id="weatherState">Loading…</div>
                    </div>

                    <!-- ── Today Hourly ── -->
                    <div class="chart-card">
                        <div class="chart-header">
                            <h3 data-i18n="hourly_today">Today — Hourly</h3>
                        </div>
                        <div class="hourly-strip" id="hourlyStrip">
                            <div class="no-data-msg" data-i18n="no_readings">No readings yet today</div>
                        </div>
                    </div>

                    <!-- ── Temperature History ── -->
                    <div class="chart-card" style="margin-bottom:0!important;">
                        <div class="chart-header">
                            <h3 data-i18n="temperature_history">Temperature History</h3>
                        </div>
                        <div class="history-list" id="historyList">
                            <div class="no-data-msg">No historical data available</div>
                        </div>
                    </div>

                </div><!-- /monitoring-main-card -->
            </div>
        </main>
    </div>

    <div id="navbar-placeholder"></div>

    <script src="/js/utils/i18n.js?v=1.6"></script>
    <script src="/js/utils/api.js?v=1.6"></script>
    <script src="/js/utils/components.js?v=1.6"></script>

    <script>
    'use strict';

    /* ── State ── */
    let allCoops     = [];
    let activeCoopId = null;

    /* ── Dropdown open/close ── */
    const btnEl = document.getElementById('coopSelectorBtn');
    const ddEl  = document.getElementById('coopDropdown');

    btnEl.addEventListener('click', function(e) {
        e.stopPropagation();
        const isOpen = ddEl.classList.toggle('open');
        btnEl.classList.toggle('open', isOpen);
    });

    document.addEventListener('click', function() {
        ddEl.classList.remove('open');
        btnEl.classList.remove('open');
    });

    /* ── Build dropdown items ── */
    function renderDropdown(coops, selectedId) {
        ddEl.innerHTML = coops.length
            ? coops.map(c =>
                `<div class="coop-dropdown-item${c.id === selectedId ? ' active' : ''}"
                      data-id="${c.id}">
                    ${escHtml(c.name || 'Coop')}
                 </div>`
              ).join('')
            : '<div class="coop-dropdown-item" style="color:#9ca3af;cursor:default;">No coops</div>';

        ddEl.querySelectorAll('.coop-dropdown-item[data-id]').forEach(el => {
            el.addEventListener('click', function(e) {
                e.stopPropagation();
                const id   = this.getAttribute('data-id');
                const name = this.textContent.trim().replace(/✓$/, '').trim();
                pickCoop(id, name);
            });
        });
    }

    function escHtml(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    /* ── Pick a coop ── */
    async function pickCoop(coopId, coopName) {
        activeCoopId = coopId;
        window.API?.setSelectedCoopId?.(coopId);

        /* Update button label */
        document.getElementById('selectedCoopName').textContent = coopName;

        /* Close dropdown */
        ddEl.classList.remove('open');
        btnEl.classList.remove('open');

        /* Refresh active marker */
        renderDropdown(allCoops, coopId);

        /* Load data */
        await loadCoopData(coopId);
    }

    /* ── Render hourly strip ── */
    function renderHourly(entries) {
        const strip = document.getElementById('hourlyStrip');
        if (!strip) return;
        if (!entries || !entries.length) {
            strip.innerHTML = '<div class="no-data-msg">No readings yet today</div>';
            return;
        }
        strip.innerHTML = entries.slice(0, 12).map((item, i) => {
            const time = new Date(item.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const temp = item.temperature != null ? Number(item.temperature).toFixed(1) : '--';
            return `<div class="hour-cell${i === 0 ? ' current' : ''}">
                        <div class="h-time">${i === 0 ? (window.i18n?.t('now') || 'Now') : time}</div>
                        <div class="h-temp">${temp}°</div>
                    </div>`;
        }).join('');
    }

    /* ── Set hero values ── */
    function setHero(data) {
        const numEl  = document.getElementById('temperatureNum');
        const hEl    = document.getElementById('humidityValue');
        const sEl    = document.getElementById('weatherState');
        const cEl    = document.getElementById('coopLabel');
        const lineEl = document.getElementById('hlLine');

        const name = data.name || 'Coop';
        if (cEl) cEl.textContent = name;

        const temp = data.temperature ?? null;
        const hum  = data.humidity   ?? null;

        if (numEl) numEl.textContent = temp != null ? Number(temp).toFixed(1) : '--';
        if (hEl)   hEl.textContent   = 'Humidity: ' + (hum != null ? Math.round(hum) + '%' : '--%');

        let state = '--';
        if (temp != null) {
            if      (temp >= 35) state = 'Hot';
            else if (temp >= 30) state = 'Warm';
            else if (temp >= 24) state = 'Neutral';
            else                 state = 'Cool';
        }
        if (sEl) sEl.textContent = state;

        if (lineEl) {
            const high  = data.temp_high ?? temp;
            const low   = data.temp_low  ?? temp;
            const hTime = data.high_at ? new Date(data.high_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '--';
            const lTime = data.low_at  ? new Date(data.low_at ).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '--';
            const fmt   = v => v != null ? Number(v).toFixed(1) + '°' : '--°';
            lineEl.innerHTML = `<span>Highest: ${fmt(high)} at ${hTime}</span><span>•</span><span>Lowest: ${fmt(low)} at ${lTime}</span>`;
        }
    }

    /* ── Load coop data ── */
    async function loadCoopData(coopId) {
        const farmId = window.API?.getSelectedFarmId?.();
        if (!farmId || !coopId) return;

        try {
            const res  = await window.API.get('/v1/farms/' + farmId + '/coops/' + coopId);
            setHero((res?.data) || {});
        } catch(e) { console.warn('coop fetch', e); }

        try {
            const tr = await window.API.get('/v1/farms/' + farmId + '/coops/' + coopId + '/temperature-timeline');
            renderHourly((tr?.data?.points) || []);
        } catch(e) { renderHourly([]); }
    }

    /* ── Init ── */
    async function init() {
        if (!window.API?.requireAuth?.()) return;
        await window.loadComponents?.();
        window.i18n?.applyAll?.();

        /* Resolve farm */
        let farmId = window.API.getSelectedFarmId?.();
        if (!farmId) {
            try {
                const r  = await window.API.get('/v1/farms');
                const fs = r?.data?.data || r?.data || [];
                if (fs.length) { farmId = fs[0].id; window.API.setSelectedFarmId?.(farmId); }
            } catch(e) {}
        }

        if (!farmId) { setHero({ name: 'No Farm' }); return; }

        /* Load coops */
        try {
            const cr = await window.API.get('/v1/farms/' + farmId + '/coops');
            allCoops = cr?.data?.coops || cr?.data || [];
        } catch(e) { allCoops = []; }

        /* Resolve active coop */
        let coopId = window.API.getSelectedCoopId?.();
        if (!coopId && allCoops.length) coopId = allCoops[0].id;
        if (coopId) window.API.setSelectedCoopId?.(coopId);
        activeCoopId = coopId;

        /* Render dropdown */
        renderDropdown(allCoops, coopId);

        /* Set selector button label */
        const active = allCoops.find(c => c.id === coopId);
        if (active) document.getElementById('selectedCoopName').textContent = active.name || 'Coop';

        /* Load data */
        if (coopId) await loadCoopData(coopId);
        else        setHero({ name: 'No coop' });
    }

    init();
    </script>
</body>
</html>
