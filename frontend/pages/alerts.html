<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alerts - Tokkatot</title>

  <!-- Tokkatot Design System (Modular) -->
  <link rel="stylesheet" href="/css/theme.css?v=1.5" />
  <link rel="stylesheet" href="/css/components.css?v=1.5" />
  <link rel="stylesheet" href="/css/layout.css?v=1.5" />
  <link rel="stylesheet" href="/css/alerts.css?v=1.0" />

  <!-- Google Material Symbols -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body>

<div id="header-placeholder"></div>

<div id="app" v-cloak class="page-container">

  <div v-if="loading" class="loading-state">
    <div class="spinner"></div>
    <span>{{ t('loading') }}</span>
  </div>

  <template v-else>

    <div class="alerts-filters">
      <div class="alerts-header">
        <span class="alerts-title">
          {{ t('alerts') }}
          <span class="tok-badge" v-if="filteredAlerts.length">{{ filteredAlerts.length }}</span>
        </span>
      </div>
      <div v-if="farms.length > 1" class="filter-row">
        <select class="tok-select" v-model="selectedFarmId" @change="onFarmChange">
          <option v-for="f in farms" :key="f.id" :value="f.id">{{ f.name }}</option>
        </select>
      </div>
      <div v-if="coops.length > 0" class="filter-row">
        <select class="tok-select" v-model="selectedCoopId" @change="onCoopChange">
          <option value="">-- {{ t('select_coop') }} --</option>
          <option v-for="c in coops" :key="c.id" :value="c.id">{{ c.name }}</option>
        </select>
      </div>
    </div>

    <!-- Empty state -->
    <div v-if="filteredAlerts.length === 0" class="alerts-empty">
      <span class="material-symbols-outlined">notifications_none</span>
      <p>{{ t('no_alerts') }}</p>
    </div>

    <div v-else class="alert-list">
      <div v-for="alert in filteredAlerts" :key="alert.id" class="alert-item" :class="{ unread: !alert.acknowledged_at }">
        <div class="alert-icon-wrap" :class="alertSeverityClass(alert.alert_type)">
          <span class="material-symbols-outlined">{{ alertIcon(alert.alert_type) }}</span>
        </div>
        <div class="alert-content">
          <div class="alert-message">{{ alert.message }}</div>
          <div class="alert-time">{{ alert.coop_name }} · {{ formatTime(alert.created_at) }}</div>
          <div v-if="alert.acknowledged_at" class="alert-acknowledged">
            <span class="material-symbols-outlined">check</span>
            {{ t('acknowledged') }} {{ formatTime(alert.acknowledged_at) }}
          </div>
        </div>
        <div class="alert-action">
          <button v-if="!alert.acknowledged_at" class="tok-btn tok-btn-secondary" @click="acknowledge(alert)" :disabled="alert.acking">
            <span v-if="alert.acking" class="spinner"></span>
            <span v-else>{{ t('acknowledge_btn') }}</span>
          </button>
        </div>
      </div>
    </div>

  </template>

</div>

<div id="navbar-placeholder"></div>

<!-- Scripts -->
<script src="/js/utils/i18n.js?v=1.5"></script>
<script src="/js/utils/api.js?v=1.5"></script>
<script src="/js/utils/components.js?v=1.5"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script>
const { createApp } = Vue;

createApp({
  data() {
    return {
      loading: true,
      farms: [],
      coops: [],
      selectedFarmId: null,
      selectedCoopId: '',
      alerts: [],
      lang: window.i18n ? window.i18n.getLang() : 'km',
    };
  },
  computed: {
    filteredAlerts() {
      if (!this.selectedCoopId) return this.alerts;
      return this.alerts.filter(a => String(a.coop_id || '') === String(this.selectedCoopId));
    }
  },
  async mounted() {
    if (!window.API.requireAuth()) return;
    await loadComponents();
    this.lang = window.i18n ? window.i18n.getLang() : 'km';
    const data = await window.API.get('/v1/farms');
    this.farms = (data && data.data && data.data.data) ? data.data.data
               : (data && data.data && Array.isArray(data.data)) ? data.data : [];
    if (this.farms.length > 0) {
      const saved = window.API.getSelectedFarmId();
      const match = saved && this.farms.find(f => String(f.id) === saved);
      this.selectedFarmId = match ? match.id : this.farms[0].id;
      window.API.setSelectedFarmId(this.selectedFarmId);
      await this.loadCoops();
    }
    this.loading = false;
  },
  methods: {
    t(k) { return window.i18n ? window.i18n.t(k) : k; },
    async loadCoops() {
      if (!this.selectedFarmId) return;
      const data = await window.API.get(`/v1/farms/${this.selectedFarmId}/coops`);
      this.coops = (data && data.data && data.data.coops) ? data.data.coops
                 : (data && data.data && Array.isArray(data.data)) ? data.data : [];
      const saved = window.API.getSelectedCoopId();
      const match = saved && this.coops.find(c => String(c.id) === saved);
      this.selectedCoopId = match ? match.id : '';
      if (this.selectedCoopId) window.API.setSelectedCoopId(this.selectedCoopId);
      await this.loadAlerts();
    },
    async onFarmChange() {
      window.API.setSelectedFarmId(this.selectedFarmId);
      this.selectedCoopId = '';
      await this.loadCoops();
    },
    async onCoopChange() {
      if (this.selectedCoopId) window.API.setSelectedCoopId(this.selectedCoopId);
    },
    async loadAlerts() {
      if (!this.selectedFarmId) return;
      try {
        const res = await window.API.get(`/v1/farms/${this.selectedFarmId}/alerts`);
        const raw = (res && res.data && Array.isArray(res.data)) ? res.data
                  : (res && res.data && Array.isArray(res.data.alerts)) ? res.data.alerts : [];
        this.alerts = raw.map(a => ({ ...a, acking: false }));
      } catch(e) { console.error(e); }
    },
    async acknowledge(alert) {
      alert.acking = true;
      try {
        const res = await window.API.put(`/v1/farms/${this.selectedFarmId}/alerts/${alert.id}/acknowledge`, {});
        if (res && res.success) {
          alert.acknowledged_at = new Date().toISOString();
        }
      } catch(e) { console.error(e); }
      finally { alert.acking = false; }
    },
    alertSeverityClass(type) {
      if (!type) return 'info';
      const t = type.toLowerCase();
      if (t.includes('critical') || t.includes('danger')) return 'critical';
      if (t.includes('warn') || t.includes('high') || t.includes('low')) return 'warning';
      return 'info';
    },
    alertIcon(type) {
      if (!type) return 'info';
      const t = type.toLowerCase();
      if (t.includes('temp') || t.includes('heat')) return 'thermostat';
      if (t.includes('humid')) return 'water_drop';
      if (t.includes('device') || t.includes('offline')) return 'electrical_services';
      if (t.includes('critical') || t.includes('danger')) return 'warning';
      return 'notifications';
    },
    formatTime(iso) {
      if (!iso) return '';
      try {
        const d = new Date(iso);
        return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
      } catch(_) { return iso; }
    }
  }
}).mount('#app');
</script>

</body>
</html>
