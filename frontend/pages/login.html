<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Tokkatot</title>
  <link rel="icon" href="/assets/images/tokkatot logo-02.png" type="image/x-icon" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#00897B" />
  
  <!-- Tokkatot Design System (Modular) -->
  <link rel="stylesheet" href="/css/theme.css?v=1.5" />
  <link rel="stylesheet" href="/css/components.css?v=1.5" />
  <link rel="stylesheet" href="/css/auth.css?v=1.5" />
  
  <!-- Google Material Symbols -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body class="auth-body">

<div id="app" class="auth-page" v-cloak>

  <!-- Language toggle -->
  <div class="lang-row">
    <button class="lang-toggle" @click="toggleLang">
      <span class="material-symbols-outlined">language</span>
      {{ lang === 'km' ? t('lang_en') : t('lang_km') }}
    </button>
  </div>

  <!-- Logo -->
  <div class="auth-logo">
    <img src="/assets/images/tokkatot logo-02.png" alt="Tokkatot" />
    <span class="auth-logo-name">Tokkatot</span>
    <span class="auth-logo-sub">{{ t('your_farm') }}</span>
  </div>

  <!-- Title -->
  <h1 class="auth-title" data-i18n="login">Login</h1>

  <!-- Error alert -->
  <div v-if="errorMsg" class="tok-badge tok-badge-alert" v-cloak style="display: flex; align-items: center; gap: 8px; padding: 12px; margin-bottom: 24px; border-radius: 8px;">
    <span class="material-symbols-outlined">error</span>
    {{ errorMsg }}
  </div>

  <!-- Login form -->
  <div class="forms-stack">
    <!-- Email -->
    <div class="tok-input-group">
      <label class="tok-label" for="email">{{ t('email') }}</label>
      <div style="position: relative;">
        <span class="material-symbols-outlined" style="position: absolute; left: 14px; top: 12px; color: var(--tok-text-secondary);">mail</span>
        <input
          id="email"
          class="tok-input"
          style="padding-left: 48px;"
          type="email"
          v-model="email"
          :placeholder="t('email')"
          autocomplete="email"
          inputmode="email"
          @keyup.enter="doLogin"
          required
        />
      </div>
    </div>

    <!-- Password -->
    <div class="tok-input-group">
      <label class="tok-label" for="password">{{ t('password') }}</label>
      <div style="position: relative;">
        <span class="material-symbols-outlined" style="position: absolute; left: 14px; top: 12px; color: var(--tok-text-secondary);">lock</span>
        <input
          id="password"
          class="tok-input"
          style="padding-left: 48px; padding-right: 48px;"
          :type="showPwd ? 'text' : 'password'"
          v-model="password"
          :placeholder="t('password')"
          autocomplete="current-password"
          @keyup.enter="doLogin"
          required
        />
        <span class="material-symbols-outlined" style="position: absolute; right: 14px; top: 12px; color: var(--tok-text-secondary); cursor: pointer;" @click="showPwd = !showPwd">
          {{ showPwd ? 'visibility_off' : 'visibility' }}
        </span>
      </div>
    </div>

    <!-- Login button -->
    <button
      class="tok-btn tok-btn-primary"
      style="width: 100%; font-size: 18px;"
      @click="doLogin"
      :disabled="loading"
    >
      <span v-if="loading" style="display: block; width: 24px; height: 24px; border: 3px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 1s linear infinite;"></span>
      <span v-else data-i18n="login">Login</span>
    </button>
  </div>

  <!-- Register link -->
  <p class="auth-footer">
    {{ t('no_account') }}
    <a href="/register">{{ t('register') }}</a>
  </p>

</div>

<!-- Scripts -->
<script src="/js/utils/i18n.js?v=1.5"></script>
<script src="/js/utils/api.js?v=1.5"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script>
const { createApp } = Vue;

createApp({
  data() {
    return {
      email:    '',
      password: '',
      showPwd:  false,
      loading:  false,
      errorMsg: '',
      lang: window.i18n ? window.i18n.getLang() : 'km'
    };
  },
  mounted() {
    if (window.API && window.API.isAuthenticated()) {
      window.location.href = '/';
    }
    this.updateTitle();
  },
  methods: {
    t(key) {
      return window.i18n ? window.i18n.t(key) : key;
    },
    toggleLang() {
      if (window.i18n) {
        window.i18n.toggleLang();
        this.lang = window.i18n.getLang();
        document.documentElement.lang = this.lang;
        document.title = this.t('login') + ' - Tokkatot';
      }
    },
    updateTitle() {
      document.title = this.t('login') + ' - Tokkatot';
    },
    async doLogin() {
      this.errorMsg = '';
      if (!this.email || !this.password) {
        this.errorMsg = this.t('fill_all_fields');
        return;
      }
      this.loading = true;
      try {
        const data = await window.API.post('/v1/auth/login', {
          email:    this.email,
          password: this.password
        });
        if (data && data.success && data.data) {
          localStorage.setItem('access_token',  data.data.access_token);
          localStorage.setItem('refresh_token', data.data.refresh_token);
          if (data.data.user) {
            if (data.data.user.name)  localStorage.setItem('user_name', data.data.user.name);
            if (data.data.user.role)  localStorage.setItem('user_role', data.data.user.role);
            if (data.data.user.id)    localStorage.setItem('user_id',   data.data.user.id);
          }
          
          if (data.data.user && data.data.user.role === 'admin') {
            window.location.href = '/admin';
          } else {
            window.location.href = '/';
          }
        } else {
          const rawMsg = (data && data.error && data.error.message) || (data && data.message) || 'login_failed';
          this.errorMsg = this.t(rawMsg);
        }
      } catch (e) {
        this.errorMsg = this.t('login_failed');
      } finally {
        this.loading = false;
      }
    }
  }
}).mount('#app');
</script>

<style>
@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</body>
</html>
