services:
  # ──────────────────────────────────────────────────────────
  # NGINX — Reverse proxy + Auto SSL via Let's Encrypt
  # Handles HTTPS termination. Required for PWA + Web Push.
  # ──────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: tokkatot-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot-webroot:/var/www/certbot:ro
      - letsencrypt-certs:/etc/letsencrypt:ro
    depends_on:
      - middleware
    networks:
      - tokkatot-net

  # ──────────────────────────────────────────────────────────
  # CERTBOT — Renews Let's Encrypt SSL certs automatically
  # ──────────────────────────────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: tokkatot-certbot
    restart: always
    volumes:
      - certbot-webroot:/var/www/certbot
      - letsencrypt-certs:/etc/letsencrypt
    # Renew every 12 hours; certbot only acts when cert is < 30 days from expiry
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $!; done"

  # ──────────────────────────────────────────────────────────
  # DATABASE — PostgreSQL with pgvector
  # Isolated on internal network; NOT exposed to public internet.
  # ──────────────────────────────────────────────────────────
  database:
    image: postgres:15-alpine
    container_name: tokkatot-database
    restart: always
    environment:
      POSTGRES_USER: tokkatot
      POSTGRES_PASSWORD: ${DB_PASSWORD:-tokkatot_secure}
      POSTGRES_DB: tokkatot
    # NO ports: mapping — database is only reachable inside the internal_net
    volumes:
      - ./infra/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tokkatot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal_net

  # ──────────────────────────────────────────────────────────
  # MIDDLEWARE — Go backend
  # Only accessible via the internal network and nginx proxy.
  # ──────────────────────────────────────────────────────────
  middleware:
    build:
      context: ./middleware
      dockerfile: Dockerfile
    container_name: tokkatot-middleware
    restart: always
    depends_on:
      database:
        condition: service_healthy
    # NOT exposed to the public internet — nginx handles all incoming traffic
    expose:
      - "3000"
    environment:
      DB_HOST: database
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-tokkatot}
      DB_SSLMODE: disable
      JWT_SECRET: ${JWT_SECRET}
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@tokkatot.com}
      ENVIRONMENT: production
      SERVER_PORT: 3000
      SERVER_HOST: 0.0.0.0
    volumes:
      - ./frontend:/app/frontend:ro
      - ./certs:/app/certs:ro
    networks:
      - internal_net
      - public_net

  # ──────────────────────────────────────────────────────────
  # AI SERVICE — future phase (disabled by default)
  # ──────────────────────────────────────────────────────────
  ai-service:
    build:
      context: ./ai-service
    container_name: tokkatot-ai
    profiles:
      - future_phase
    expose:
      - "8000"
    environment:
      PORT: 8000
      HOST: 0.0.0.0
    networks:
      - internal_net

  # ──────────────────────────────────────────────────────────
  # GATEWAY SIMULATOR — periodic telemetry generator
  # ──────────────────────────────────────────────────────────
  gateway-sim:
    image: golang:1.23-alpine
    container_name: tokkatot-gateway-sim
    restart: always
    environment:
      CLOUD_API_URL: http://tokkatot-middleware:3000
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD}
    working_dir: /app
    volumes:
      - ./middleware:/app
    command: ["go", "run", "./scripts/gateway_sim/main.go", "--once", "--interval", "30", "--poll-schedules", "--email", "${INITIAL_ADMIN_EMAIL}", "--password", "${INITIAL_ADMIN_PASSWORD}", "--create-farm", "--create-coop"]
    depends_on:
      middleware:
        condition: service_started
    networks:
      - internal_net

# ──────────────────────────────────────────────────────────
# NETWORKS
# public_net: nginx ↔ middleware (minimal surface)
# internal_net: middleware ↔ database (never exposed)
# ──────────────────────────────────────────────────────────
networks:
  public_net:
    driver: bridge
  internal_net:
    driver: bridge
    internal: true   # Blocks all external traffic to this network

# ──────────────────────────────────────────────────────────
# VOLUMES
# ──────────────────────────────────────────────────────────
volumes:
  pgdata:
  certbot-webroot:
  letsencrypt-certs:
