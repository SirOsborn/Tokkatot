services:
  # ──────────────────────────────────────────────────────────
  # NGINX — Reverse proxy + Auto SSL via Let's Encrypt
  # Handles HTTPS termination. Required for PWA + Web Push.
  # ──────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: tokkatot-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot-webroot:/var/www/certbot:ro
      - letsencrypt-certs:/etc/letsencrypt:ro
    depends_on:
      - middleware
    networks:
      - public_net
      - proxy-net  # Reaches tokkatot-staging-middleware for staging.tokkatot.com

  # ──────────────────────────────────────────────────────────
  # CERTBOT — Renews Let's Encrypt SSL certs automatically
  # ──────────────────────────────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: tokkatot-certbot
    restart: always
    volumes:
      - certbot-webroot:/var/www/certbot
      - letsencrypt-certs:/etc/letsencrypt
    # Renew every 12 hours; certbot only acts when cert is < 30 days from expiry
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $$!; done"

  # ──────────────────────────────────────────────────────────
  # DATABASE — PostgreSQL with pgvector
  # Isolated on internal network; NOT exposed to public internet.
  # ──────────────────────────────────────────────────────────
  database:
    image: postgres:15-alpine
    container_name: tokkatot-database
    restart: always
    environment:
      POSTGRES_USER: tokkatot
      POSTGRES_PASSWORD: ${DB_PASSWORD:-tokkatot_secure}
      POSTGRES_DB: tokkatot
    # NO ports: mapping — database is only reachable inside the internal_net
    volumes:
      - ./infra/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tokkatot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - internal_net

  # ──────────────────────────────────────────────────────────
  # MIDDLEWARE — Go backend
  # Only accessible via the internal network and nginx proxy.
  # ──────────────────────────────────────────────────────────
  middleware:
    image: ghcr.io/sirosborn/tokkatot/middleware:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: middleware/Dockerfile
    container_name: tokkatot-middleware
    restart: always
    depends_on:
      database:
        condition: service_healthy
    # NOT exposed to the public internet — nginx handles all incoming traffic
    expose:
      - "3000"
    environment:
      DB_HOST: database
      DB_PORT: 5432
      DB_USER: ${DB_USER:-tokkatot}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-tokkatot}
      DB_SSLMODE: disable
      JWT_SECRET: ${JWT_SECRET}
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD}
      TEST_FARMER_EMAIL: ${TEST_FARMER_EMAIL:-}
      TEST_FARMER_PASSWORD: ${TEST_FARMER_PASSWORD:-}
      DEMO_FARM_NAME: ${DEMO_FARM_NAME:-Demo Farm}
      DEMO_COOP_NAME: ${DEMO_COOP_NAME:-Coop 1}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@tokkatot.com}
      ENVIRONMENT: production
      SERVER_PORT: 3000
      SERVER_HOST: 0.0.0.0
    volumes:
      - ./frontend:/app/frontend:ro
    networks:
      - internal_net
      - public_net

  # ──────────────────────────────────────────────────────────
  # AI SERVICE — future phase (disabled by default)
  # ──────────────────────────────────────────────────────────
  ai-service:
    build:
      context: ./ai-service
    container_name: tokkatot-ai
    profiles:
      - future_phase
    expose:
      - "8000"
    environment:
      PORT: 8000
      HOST: 0.0.0.0
    networks:
      - internal_net

  # ──────────────────────────────────────────────────────────
  # GATEWAY SIMULATOR — periodic telemetry generator
  # ──────────────────────────────────────────────────────────
  gateway-sim:
    image: golang:1.23-alpine
    container_name: tokkatot-gateway-sim
    restart: on-failure
    environment:
      CLOUD_API_URL: http://tokkatot-middleware:3000
      TEST_FARMER_EMAIL: ${TEST_FARMER_EMAIL}
      TEST_FARMER_PASSWORD: ${TEST_FARMER_PASSWORD}
      DEMO_FARM_NAME: ${DEMO_FARM_NAME:-Demo Farm}
      DEMO_COOP_NAME: ${DEMO_COOP_NAME:-Coop 1}
    working_dir: /app
    volumes:
      - ./middleware:/app
    # Sleep 20s so middleware has time to fully bind port 3000 after healthcheck passes
    command: >
      sh -c "sleep 20 && go run ./scripts/gateway_sim/main.go
      --once --interval 30 --poll-schedules
      --email $$TEST_FARMER_EMAIL --password $$TEST_FARMER_PASSWORD
      --farm-name \"$$DEMO_FARM_NAME\" --coop-name \"$$DEMO_COOP_NAME\"
      --create-farm --create-coop"
    depends_on:
      middleware:
        condition: service_started
    networks:
      - internal_net

# ──────────────────────────────────────────────────────────
# NETWORKS
# public_net: nginx ↔ middleware (minimal surface)
# internal_net: middleware ↔ database (never exposed)
# ──────────────────────────────────────────────────────────
networks:
  public_net:
    driver: bridge
  internal_net:
    driver: bridge
    internal: true   # Blocks all external traffic to this network
  proxy-net:
    external: true
    name: tokkatot-proxy-net  # Shared with staging compose project

# ──────────────────────────────────────────────────────────
# VOLUMES
# ──────────────────────────────────────────────────────────
volumes:
  postgres_data:
  certbot-webroot:
  letsencrypt-certs:
