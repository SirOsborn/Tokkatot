# ================================================================
# Tokkatot Nginx Configuration
# Domain: app.tokkatot.com  (farm control PWA)
# Landing page (tokkatot.com) stays on Cloudflare Pages — untouched.
# ================================================================

# ── Redirect all HTTP to HTTPS ──────────────────────────────────
server {
    listen 80;
    server_name app.tokkatot.com;

    # Required for Certbot Let's Encrypt domain verification
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://app.tokkatot.com$request_uri;
    }
}

# ── HTTPS — Farm Control App ─────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name app.tokkatot.com;

    # SSL Certificates (managed by Certbot / Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/app.tokkatot.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.tokkatot.com/privkey.pem;

    # Modern SSL hardening (TLS 1.2/1.3 only)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    # Required so the browser allows the service worker to control the full app scope
    add_header Service-Worker-Allowed "/" always;

    # Max upload size (disease detection images)
    client_max_body_size 12M;

    # Gzip compression (critical for farmers on 3G/4G rural connections)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # ── WebSocket real-time updates passthrough ─────────────────
    location /v1/ws {
        proxy_pass http://middleware:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Static asset caching (CSS, JS, images) ─────────────────
    location ~* \.(css|js|png|jpg|jpeg|svg|ico|woff2?)$ {
        proxy_pass http://middleware:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── Never cache the service worker or PWA manifest ─────────
    location ~* (sw\.js|manifest\.json)$ {
        proxy_pass http://middleware:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        expires -1;
    }

    # ── All other requests (API + HTML pages) ──────────────────
    location / {
        proxy_pass http://middleware:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }
}
